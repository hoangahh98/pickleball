<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm VĐV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">➕ THÊM VĐV MỚI</span>
            <a href="/van-dong-vien" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 500px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <form action="/van-dong-vien/them" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên VĐV *</label>
                        <input type="text" class="form-control" name="ten_vdv" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Trình Độ</label>
                        <select class="form-select" name="trinh_do">
                            <option value="A">A (Pro)</option>
                            <option value="B">B (Advanced)</option>
                            <option value="C" selected>C (Intermediate)</option>
                            <option value="D">D (Beginner)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ghi Chú</label>
                        <textarea class="form-control" name="ghi_chu" rows="3"></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg fw-bold">✅ THÊM VĐV</button>
                        <a href="/van-dong-vien" class="btn btn-secondary">HỦY</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
