<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài Đặt Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">⚙️ Cài Đặt Admin</span>
            <div>
                <a href="/" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
                <a href="/dang-xuat" class="btn btn-sm btn-outline-danger">🚪 Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white fw-bold">➕ Tạo Tài Khoản Admin Mới</div>
            <div class="card-body">
                {% if success %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    ✅ {{ success }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}

                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    ❌ {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}

                <form action="/tao-admin" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">📧 Email Admin</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">🔐 Mật khẩu</label>
                        <input type="password" name="password" class="form-control" required>
                        <small class="text-muted">Tối thiểu 6 ký tự</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">🔐 Xác nhận mật khẩu</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">✅ Tạo Admin</button>
                </form>
            </div>
        </div>

        <div class="mt-4">
            <a href="/" class="btn btn-secondary w-100">Quay lại Trang Chủ</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
