<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài Đặt Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include '_pwa_head.html' %}
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">⚙️ CÀI ĐẶT ADMIN</span>
            <div>
                <a href="/" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
                <a href="/dang-xuat" class="btn btn-sm btn-outline-danger">🚪 Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 600px;">
        {% if success %}
        <div class="alert alert-success alert-dismissible fade show">
            ✅ {{ success }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show">
            ❌ {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white fw-bold">🔐 TẠO TÀI KHOẢN ADMIN MỚI</div>
            <div class="card-body">
                <form action="/tao-admin" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">📧 Email *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">🔐 Mật Khẩu *</label>
                        <input type="password" class="form-control" name="password" required minlength="6">
                        <small class="text-muted">Tối thiểu 6 ký tự</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">🔐 Nhập Lại Mật Khẩu *</label>
                        <input type="password" class="form-control" name="confirm_password" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg fw-bold">✅ TẠO ADMIN</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% include '_pwa_register.html' %}
</body>
</html>
