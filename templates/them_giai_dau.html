<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Giải</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include '_pwa_head.html' %}
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🏸 Tạo Giải Mới</span>
            <a href="/giai-dau" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-body p-4">
                {% if errors %}
                <div class="alert alert-danger">
                    <ul class="mb-0">
                        {% for error in errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}
                <form method="POST" action="/them-giai-dau">
                    <!-- TÊN GIẢI -->
                    <div class="mb-3">
                        <label class="form-label"><strong>📝 Tên Giải <span class="text-danger">*</span></strong></label>
                        <input type="text" name="ten_giai_dau" class="form-control" value="{{ form_data.get('ten_giai_dau', '') if form_data else '' }}" required>
                    </div>

                    <!-- ĐỊA ĐIỂM -->
                    <div class="mb-3">
                        <label class="form-label"><strong>📍 Địa Điểm</strong></label>
                        <input type="text" name="dia_diem" class="form-control" value="{{ form_data.get('dia_diem', '') if form_data else '' }}">
                    </div>

                    <!-- THỜI GIAN -->
                    <div class="mb-3">
                        <label class="form-label"><strong>⏰ Thời Gian Bắt Đầu</strong></label>
                        <input type="datetime-local" name="thoi_gian_bat_dau" class="form-control" value="{{ form_data.get('thoi_gian_bat_dau', '') if form_data else '' }}">
                    </div>

                    <!-- SỐ SÂN -->
                    <div class="mb-3">
                        <label class="form-label"><strong>🏟️ Số Sân <span class="text-danger">*</span></strong></label>
                        <input type="number" name="so_luong_san" class="form-control" value="{{ form_data.get('so_luong_san', 1) if form_data else 1 }}" required>
                    </div>

                    <!-- HÌNH THỨC THI ĐẤU -->
                    <div class="mb-3">
                        <label class="form-label"><strong>🎮 Hình Thức Thi Đấu</strong></label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="loai_dau" value="don" id="don" checked>
                            <label class="btn btn-outline-primary" for="don">👤 Thi Đơn (1v1)</label>
                            
                            <input type="radio" class="btn-check" name="loai_dau" value="doi" id="doi">
                            <label class="btn btn-outline-primary" for="doi">👥 Thi Đôi (2v2)</label>
                        </div>
                    </div>

                    <!-- SỐ NGƯỜI DỰ KIẾN -->
                    <div class="mb-3">
                        <label class="form-label"><strong>👥 Số Người Dự Kiến <span class="text-danger">*</span></strong></label>
                        <input type="number" name="so_nguoi_du_kien" class="form-control" value="{{ form_data.get('so_nguoi_du_kien', 10) if form_data else 10 }}" required>
                    </div>

                    <!-- CHI PHÍ -->
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <h6 class="mb-3"><strong>💰 Chi Phí</strong></h6>
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <label class="form-label">Sân Bãi (đ)</label>
                                    <input type="number" name="chi_phi_san_bai" class="form-control" value="0">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Ăn uống (đ)</label>
                                    <input type="number" name="chi_phi_nuoc_noi" class="form-control" value="0">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Giải Thưởng (đ)</label>
                                    <input type="number" name="chi_phi_giai_thuong" class="form-control" value="0">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Khác (đ)</label>
                                    <input type="number" name="chi_phi_khac" class="form-control" value="0">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TỶ LỆ GIẢI -->
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <h6 class="mb-3"><strong>🏆 Tỷ Lệ Giải</strong></h6>
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label">Giải 1 (%)</label>
                                    <input type="number" name="ty_le_giai_1" class="form-control" min="0" placeholder="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Giải 2 (%)</label>
                                    <input type="number" name="ty_le_giai_2" class="form-control" min="0" placeholder="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Giải 3 (%)</label>
                                    <input type="number" name="ty_le_giai_3" class="form-control" min="0" placeholder="0">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">✅ Tạo Giải</button>
                        <a href="/giai-dau" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% include '_pwa_register.html' %}
{% include '_interaction_feedback.html' %}
</body>
</html>
