<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Giải Đấu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">⚙️ Sửa Giải Đấu</span>
            <div>
                <a href="/" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
                <a href="/dang-xuat" class="btn btn-sm btn-outline-danger">🚪 Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark fw-bold">✏️ CHỈNH SỬA THÔNG TIN GIẢI ĐẤU</div>
            <div class="card-body">
                <form action="/sua-giai-dau/{{ giai[0] }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">📝 Tên Giải</label>
                        <input type="text" class="form-control" name="ten_giai_dau" value="{{ giai[1] }}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">🏟️ Số Sân</label>
                            <input type="number" class="form-control" name="so_luong_san" value="{{ giai[2] }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">👥 Dự Kiến VĐV</label>
                            <input type="number" class="form-control" name="so_nguoi_du_kien" value="{{ giai[11] }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">📍 Địa Điểm</label>
                        <input type="text" class="form-control" name="dia_diem" value="{{ giai[3] or '' }}">
                    </div>

                    <!-- ✅ FIXED: Thêm input thời gian -->
                    <div class="mb-3">
                        <label class="form-label">⏰ Thời Gian Bắt Đầu</label>
                        <input type="datetime-local" class="form-control" name="thoi_gian_bat_dau" 
                               value="{% if giai[12] %}{{ giai[12].strftime('%Y-%m-%dT%H:%M') }}{% endif %}">
                    </div>

                    <hr class="my-4">
                    <h6 class="text-muted">💰 CHI PHÍ</h6>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sân Bài (đ)</label>
                            <input type="number" class="form-control" name="chi_phi_san_bai" value="{{ giai[4] }}" step="1000">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nước/Hậu Cần (đ)</label>
                            <input type="number" class="form-control" name="chi_phi_nuoc_noi" value="{{ giai[5] }}" step="1000">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Giải Thưởng (đ)</label>
                            <input type="number" class="form-control" name="chi_phi_giai_thuong" value="{{ giai[6] }}" step="1000">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Chi Phí Khác (đ)</label>
                            <input type="number" class="form-control" name="chi_phi_khac" value="{{ giai[7] }}" step="1000">
                        </div>
                    </div>

                    <hr class="my-4">
                    <h6 class="text-muted">🏆 TỶ LỆ GIẢI THƯỞNG</h6>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">🥇 Giải 1</label>
                            <input type="number" class="form-control" name="ty_le_giai_1" value="{{ giai[8] }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">🥈 Giải 2</label>
                            <input type="number" class="form-control" name="ty_le_giai_2" value="{{ giai[9] }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">🥉 Giải 3</label>
                            <input type="number" class="form-control" name="ty_le_giai_3" value="{{ giai[10] }}">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">💾 LƯU THAY ĐỔI</button>
                        <a href="/" class="btn btn-secondary">❌ HỦY</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
