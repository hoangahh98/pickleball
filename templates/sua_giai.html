<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Giải</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">✏️ Sửa Giải</span>
            <a href="/" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-body p-4">
                <form method="POST">
                    <!-- TÊN GIẢI -->
                    <div class="mb-3">
                        <label class="form-label"><strong>📝 Tên Giải</strong></label>
                        <input type="text" name="ten_giai_dau" class="form-control" value="{{ giai[1] }}" required>
                    </div>

                    <!-- ĐỊA ĐIỂM -->
                    <div class="mb-3">
                        <label class="form-label"><strong>📍 Địa Điểm</strong></label>
                        <input type="text" name="dia_diem" class="form-control" value="{{ giai[3] or '' }}">
                    </div>

                    <!-- THỜI GIAN -->
                    <div class="mb-3">
                        <label class="form-label"><strong>⏰ Thời Gian Bắt Đầu</strong></label>
                        <input type="datetime-local" name="thoi_gian_bat_dau" class="form-control" value="{% if giai[12] %}{{ giai[12].strftime('%Y-%m-%dT%H:%M') }}{% endif %}">
                    </div>

                    <!-- SỐ SÂN -->
                    <div class="mb-3">
                        <label class="form-label"><strong>🏟️ Số Sân</strong></label>
                        <input type="number" name="so_luong_san" class="form-control" value="{{ giai[2] }}" required>
                    </div>

                    <!-- HÌNH THỨC THI ĐẤU -->
                    <div class="mb-3">
                        <label class="form-label"><strong>🎮 Hình Thức Thi Đấu</strong></label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="loai_dau" value="don" id="don" {% if giai[15] == 'don' or not giai[15] %}checked{% endif %}>
                            <label class="btn btn-outline-primary" for="don">👤 Thi Đơn (1v1)</label>
                            
                            <input type="radio" class="btn-check" name="loai_dau" value="doi" id="doi" {% if giai[15] == 'doi' %}checked{% endif %}>
                            <label class="btn btn-outline-primary" for="doi">👥 Thi Đôi (2v2)</label>
                        </div>
                    </div>

                    <!-- SỐ NGƯỜI DỰ KIẾN -->
                    <div class="mb-3">
                        <label class="form-label"><strong>👥 Số Người Dự Kiến</strong></label>
                        <input type="number" name="so_nguoi_du_kien" class="form-control" value="{{ giai[11] }}" required>
                    </div>

                    <!-- CHI PHÍ -->
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <h6 class="mb-3"><strong>💰 Chi Phí</strong></h6>
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <label class="form-label">Sân Bãi (đ)</label>
                                    <input type="number" name="chi_phi_san_bai" class="form-control" value="{{ giai[4] or 0 }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Nước/Nồi (đ)</label>
                                    <input type="number" name="chi_phi_nuoc_noi" class="form-control" value="{{ giai[5] or 0 }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Giải Thưởng (đ)</label>
                                    <input type="number" name="chi_phi_giai_thuong" class="form-control" value="{{ giai[6] or 0 }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Khác (đ)</label>
                                    <input type="number" name="chi_phi_khac" class="form-control" value="{{ giai[7] or 0 }}">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TỶ LỆ GIẢI -->
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <h6 class="mb-3"><strong>🏆 Tỷ Lệ Giải</strong></h6>
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label">Giải 1 (%)</label>
                                    <input type="number" name="ty_le_giai_1" class="form-control" value="{{ giai[8] or 5 }}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Giải 2 (%)</label>
                                    <input type="number" name="ty_le_giai_2" class="form-control" value="{{ giai[9] or 3 }}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Giải 3 (%)</label>
                                    <input type="number" name="ty_le_giai_3" class="form-control" value="{{ giai[10] or 2 }}">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">💾 Lưu Thay Đổi</button>
                        <a href="/" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
