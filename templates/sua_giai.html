<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh Sửa Giải Đấu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .preview-img { max-width: 200px; max-height: 150px; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 800px;">
        <a href="/" class="btn btn-secondary btn-sm mb-3">⬅️ Hủy & Quay lại</a>
        <div class="card shadow">
            <div class="card-header bg-warning text-dark text-center"><h4 class="mb-0 fw-bold">✏️ SỬA GIẢI ĐẤU</h4></div>
            <div class="card-body">
                <form action="/sua-giai-dau/{{ giai[0] }}" method="POST" enctype="multipart/form-data">
                    <!-- THÔNG TIN CƠ BẢN -->
                    <div class="mb-3"><label class="form-label fw-bold">Tên giải đấu:</label><input type="text" name="ten_giai_dau" class="form-control" value="{{ giai[1] }}" required></div>
                    
                    <div class="row g-2 mb-3">
                        <div class="col-6"><label class="form-label fw-bold">Số lượng sân:</label><input type="number" name="so_luong_san" class="form-control" value="{{ giai[2] }}" required></div>
                        <div class="col-6"><label class="form-label fw-bold">Số người dự kiến:</label><input type="number" name="so_nguoi_du_kien" class="form-control" value="{{ giai[11] or 10 }}" min="1" required></div>
                    </div>
                    
                    <div class="mb-3"><label class="form-label fw-bold">Địa điểm:</label><input type="text" name="dia_diem" class="form-control" value="{{ giai[3] or '' }}"></div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">⏰ Thời gian bắt đầu:</label>
                        <input type="datetime-local" name="thoi_gian_bat_dau" class="form-control" 
                               value="{{ giai[12] or '' }}">
                    </div>

                    <hr>

                    <!-- CHI PHÍ -->
                    <h6 class="text-muted fw-bold mb-2">💰 Chi phí & Tỷ lệ giải</h6>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><label class="form-label small">Tiền sân:</label><input type="number" name="chi_phi_san_bai" class="form-control" value="{{ giai[4]|int }}"></div>
                        <div class="col-6"><label class="form-label small">Tiền nước:</label><input type="number" name="chi_phi_nuoc_noi" class="form-control" value="{{ giai[5]|int }}"></div>
                        <div class="col-6"><label class="form-label small">Thưởng gốc:</label><input type="number" name="chi_phi_giai_thuong" class="form-control" value="{{ giai[6]|int }}"></div>
                        <div class="col-6"><label class="form-label small">Khác:</label><input type="number" name="chi_phi_khac" class="form-control" value="{{ giai[7]|int }}"></div>
                    </div>
                    <div class="p-2 border rounded bg-light mb-3">
                        <label class="form-label small fw-bold text-primary">📊 Điều chỉnh tỷ lệ giải (3 giải):</label>
                        <div class="input-group input-group-sm">
                            <input type="number" name="ty_le_giai_1" class="form-control text-center" value="{{ giai[8] or 5 }}" required>
                            <span class="input-group-text">/</span>
                            <input type="number" name="ty_le_giai_2" class="form-control text-center" value="{{ giai[9] or 3 }}" required>
                            <span class="input-group-text">/</span>
                            <input type="number" name="ty_le_giai_3" class="form-control text-center" value="{{ giai[10] or 2 }}" required>
                        </div>
                    </div>

                    <hr>

                    <!-- HÌNH ẢNH -->
                    <h6 class="text-muted fw-bold mb-2">🖼️ Ảnh & Tài liệu</h6>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">🏆 Banner nhà tài trợ vàng:</label>
                        <input type="file" name="banner_image" class="form-control" accept="image/*"
                               onchange="previewBanner(this)">
                        {% if giai[13] %}
                            <div class="mt-2">
                                <small class="text-muted">Ảnh hiện tại:</small>
                                <img src="{{ giai[13] }}" alt="banner" class="preview-img d-block">
                                <div class="form-check mt-2">
                                    <input type="checkbox" name="delete_banner" id="del_banner" class="form-check-input">
                                    <label class="form-check-label" for="del_banner">Xóa ảnh này</label>
                                </div>
                            </div>
                        {% endif %}
                        <div id="banner-preview"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">💳 QR chuyển tiền:</label>
                        <input type="file" name="qr_image" class="form-control" accept="image/*"
                               onchange="previewQR(this)">
                        {% if giai[14] %}
                            <div class="mt-2">
                                <small class="text-muted">Ảnh hiện tại:</small>
                                <img src="{{ giai[14] }}" alt="qr" class="preview-img d-block">
                                <div class="form-check mt-2">
                                    <input type="checkbox" name="delete_qr" id="del_qr" class="form-check-input">
                                    <label class="form-check-label" for="del_qr">Xóa ảnh này</label>
                                </div>
                            </div>
                        {% endif %}
                        <div id="qr-preview"></div>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 fw-bold">Cập Nhật Thay Đổi</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    function previewBanner(input) {
        const preview = document.getElementById('banner-preview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML = '<small class="text-muted">Ảnh mới:</small><img src="' + e.target.result + '" alt="banner" class="preview-img d-block">';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    function previewQR(input) {
        const preview = document.getElementById('qr-preview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML = '<small class="text-muted">Ảnh mới:</small><img src="' + e.target.result + '" alt="qr" class="preview-img d-block">';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    </script>
</body>
</html>
