<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý VĐV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">👥 Quản Lý Vận Động Viên</span>
            <div>
                <a href="/" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
                <a href="/dang-xuat" class="btn btn-sm btn-outline-danger">🚪 Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <a href="/van-dong-vien/them" class="btn btn-success btn-lg fw-bold">➕ THÊM VĐV MỚI</a>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white fw-bold">📋 DANH SÁCH VĐV</div>
            <div class="card-body">
                {% if vdv_list %}
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Tên</th><th>Trình Độ</th><th>Email</th><th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                    {% for vdv in vdv_list %}
                    <tr>
                        <td><strong>{{ vdv[1] }}</strong></td>
                        <td><span class="badge bg-info">{{ vdv[2] }}</span></td>
                        <td>{{ vdv[3] }}</td>
                        <td>
                            <a href="/van-dong-vien/{{ vdv[0] }}/sua" class="btn btn-sm btn-warning">Sửa</a>
                            <a href="/van-dong-vien/{{ vdv[0] }}/xoa" class="btn btn-sm btn-danger" onclick="return confirm('Xóa?')">Xóa</a>
                        </td>
                    </tr>
                    {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <div class="alert alert-info">Chưa có VĐV</div>
                {% endif %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
