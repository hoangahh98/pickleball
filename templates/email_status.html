<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết quả gửi thông báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white fw-bold">📧 Kết quả gửi thông báo</div>
        <div class="card-body">
            <div class="list-group">
            {% for result in results %}
                <div class="list-group-item">
                    {{ result }}
                </div>
            {% endfor %}
            </div>
            
            <div class="mt-4 d-flex gap-2">
                <a href="/giai-dau/{{ giai_id }}" class="btn btn-primary">Quay lại giải đấu</a>
                <a href="/" class="btn btn-secondary">Về trang chủ</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
